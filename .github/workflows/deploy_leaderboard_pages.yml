name: Deploy Leaderboard Pages

on:
  push:
    branches:
      - main
    paths:
      - "results/**"
      - "leaderboard/**"
      - "docs/urb.png"
      - ".github/workflows/deploy_leaderboard_pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build leaderboard site
        run: python3 leaderboard/generate_leaderboard.py --output-dir docs/leaderboard

      - name: Disable Jekyll processing
        run: touch docs/leaderboard/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/leaderboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
